<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Trading Dashboard</title>
<style>body{background:#0f172a;color:#e2e8f0;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;}
.box{text-align:center;}.spinner{width:40px;height:40px;border:3px solid #334155;border-top-color:#60a5fa;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg)}}h2{font-size:1.2rem;color:#94a3b8;}p{color:#64748b;font-size:0.85rem;margin-top:8px;}</style>
</head><body><div class="box"><div class="spinner"></div>
<h2>Dashboard loading...</h2><p>Will be populated on the next GitHub Actions run (up to 15 minutes).</p></div></body></html>
